# ===============================
# Application Configuration
# ===============================
spring.application.name=resumeiq

# ===============================
# Database Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Uses env vars in production (Render/TiDB); falls back to local MySQL for dev.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/resumeiq?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# ===============================
# JPA / Hibernate Settings
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===============================
# File Upload Settings
# ===============================
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB

# ===============================
# Connection Pool (HikariCP)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# Server Configuration
# ===============================
# Render provides the port via $PORT; default 8081 for local dev.
server.port=${PORT:8081}

# ===============================
# Logging
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# Temporary Dummy Keys
# (replace later if needed)
# ===============================
apiKey=test
genKey=test

# ===============================
# Groq AI (free tier) - primary analysis provider
# Get a free key (no credit card) at https://console.groq.com/keys
# Paste it below OR set the GROQ_API_KEY environment variable.
# If left blank, the app uses the built-in offline analysis engine.
# ===============================
groqKey=${GROQ_KEY:}
groqModel=llama-3.1-8b-instant

spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
spring.security.oauth2.client.registration.google.scope=openid,email,profile

application-id=test
application-api-key=test

jwt-key=${JWT_KEY:test123456789012345678901234567890}